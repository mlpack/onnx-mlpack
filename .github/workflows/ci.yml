# ci.yml: defines the CI jobs for the onnx-mlpack project.
#
# We simply build and run the tests on Linux and macOS.
# For now, Windows isn't built due to ONNX packaging difficulties.

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  release:
    types: [published, created, edited]
permissions:
  contents: read
name: onnx-mlpack

jobs:
  linux:
    name: "Linux build"
    if: ${{ github.repository == 'mlpack/onnx-mlpack' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install --yes --allow-unauthenticated \
            libopenblas-dev libstb-dev libprotobuf-dev libprotoc-dev \
            protobuf-compiler

    - name: Build minimum-supported ONNX version
      run: |
        curl -O onnx-1.15.0.tar.gz https://github.com/onnx/onnx/archive/refs/tags/v1.15.0.tar.gz
        tar -xvzpf onnx-1.15.0.tar.gz
        cd onnx-1.15.0/
        mkdir build/
        cd build/
        cmake \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DONNX_USE_PROTOBUF_SHARED_LIBS=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DONNX_BUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=../inst/ \
            -DPYTHON_EXECUTABLE=`which python3` ../
        make -j4 install
        cd ../../

    - name: Configure onnx-mlpack with CMake
      run: |
        mkdir build && cd build
        cmake \
            -DONNX_INCLUDE_DIR=../onnx-1.15.0/inst/include/ \
            -DONNX_LIBRARY=../onnx-1.15.0/inst/lib/libonnx.so \
            -DONNX_PROTO_LIBRARY=../onnx-1.15.0/inst/lib/libonnx_proto.so ../

    - name: Build onnx-mlpack
      run: cd build && make -j4

    - name: Run tests
      run: cd build && ./onnx_mlpack_test -r junit -o onnx_mlpack_test.junit.xml

    - name: Parse test output
      uses: rcurtin/test-summary-action@dist
      if: success() || failure()
      with:
        paths: "build/*.junit.xml"
        show: "fail, skip"
        fail_job: true
        print_output: true

  macos:
    name: "macOS build"
    if: ${{ github.repository == 'mlpack/onnx-mlpack' }}
    runs-on: macOS-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
        brew install libomp openblas armadillo cereal ensmallen onnx protobuf

    - name: Configure onnx-mlpack with CMake
      run: |
        mkdir build && cd build
        cmake ../

    - name: Build onnx-mlpack
      run: cd build && make -j4

    - name: Run tests
      run: cd build && ./onnx_mlpack_test -r junit -o onnx_mlpack_test.junit.xml

    - name: Parse test output
      uses: rcurtin/test-summary-action@dist
      if: success() || failure()
      with:
        paths: "build/*.junit.xml"
        show: "fail, skip"
        fail_job: true
        print_output: true
